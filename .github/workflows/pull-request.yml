name: Unit Tests (Multi-platform)

on:
  pull_request:
    branches: [ main, qa, dev ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            env_flags: "0 1 1 0"
          - os: windows-latest
            env_flags: "0 0 1 0"
          - os: macos-latest
            env_flags: "0 0 1 0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install just
        uses: taiki-e/install-action@just

      # --- RUST SETUP ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # --- C++ / LLVM / DOCUMENTATION DEPENDENCIES ---
      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y clang clangd lldb lld llvm clang-tidy clang-tools cmake ninja-build cppcheck lcov

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm cmake ninja cppcheck lcov

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja cppcheck llvm

      # --- EXECUTION ---
      - name: Run Execution Pipeline
        run: |
          just config-env ${{ matrix.env_flags }}
          just build-env
          just test-env
